<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>TV · Painel Operacional Fiscal · LaraFy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deepest: #061525;
    --bg-main: #0a2638;
    --bg-elev: #0f2d42;
    --bg-card: #102e44;
    --border: rgba(53, 185, 215, 0.10);
    --border-strong: rgba(53, 185, 215, 0.22);
    --cyan: #35b9d7;
    --cyan-soft: #5fcce5;
    --cyan-dim: #1d8aa3;
    --text-primary: #ffffff;
    --text-secondary: #a3bccf;
    --text-muted: #5e7a8e;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --font: 'Poppins', -apple-system, system-ui, sans-serif;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg-deepest);
    color: var(--text-primary);
    font-family: var(--font);
    overflow: hidden;
    font-feature-settings: 'tnum', 'kern';
    cursor: none;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(53, 185, 215, 0.06), transparent 70%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(53, 185, 215, 0.04), transparent 70%),
      var(--bg-deepest);
  }

  .dashboard {
    display: grid;
    grid-template-rows: 88px 200px 180px 1fr 56px;
    height: 100vh;
    width: 100vw;
    gap: 0;
  }

  /* ==================== HEADER ==================== */
  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 0 48px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-main) 0%, transparent 100%);
    gap: 48px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .brand-logo {
    height: 36px;
    filter: brightness(0) invert(1);
    opacity: 0.96;
  }

  .brand-divider {
    width: 1px;
    height: 28px;
    background: var(--border-strong);
  }

  .header-title h1 {
    font-family: var(--font);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1;
    color: var(--text-primary);
  }

  .header-title .sub {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-top: 6px;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .meta-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .meta-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .meta-value.sans {
    font-size: 18px;
    font-weight: 500;
  }

  .live {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--green);
    font-weight: 700;
  }

  .live::before {
    content: '';
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70% { box-shadow: 0 0 0 14px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }

  /* ==================== KPI ROWS ==================== */
  .kpis-top, .kpis-bottom {
    display: grid;
    padding: 24px 32px;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .kpis-top { grid-template-columns: repeat(4, 1fr); }
  .kpis-bottom { grid-template-columns: repeat(3, 1fr); }

  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .kpi-accent {
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    width: 0;
    background: var(--cyan);
    animation: accentFill 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 0.2s;
  }

  .kpi.green .kpi-accent { background: var(--green); }
  .kpi.amber .kpi-accent { background: var(--amber); }
  .kpi.red .kpi-accent { background: var(--red); }
  .kpi.cyan .kpi-accent { background: var(--cyan); }

  @keyframes accentFill { to { width: 100%; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .kpi:nth-child(1) { animation-delay: 0.05s; }
  .kpi:nth-child(2) { animation-delay: 0.12s; }
  .kpi:nth-child(3) { animation-delay: 0.19s; }
  .kpi:nth-child(4) { animation-delay: 0.26s; }

  .kpi-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .kpi-value {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .kpi.green .kpi-value { color: var(--green); }
  .kpi.amber .kpi-value { color: var(--amber); }
  .kpi.red .kpi-value { color: var(--red); }
  .kpi.cyan .kpi-value { color: var(--cyan); }

  .kpi-sub {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .kpi-sub strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* Special: forecast kpi compact */
  .kpis-bottom .kpi-value { font-size: 56px; }

  /* ==================== BOTTOM SPLIT ==================== */
  .bottom {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    overflow: hidden;
  }

  .panel {
    padding: 28px 36px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel:last-child { border-right: none; }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .panel-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.015em;
    color: var(--text-primary);
  }

  .panel-title em {
    font-style: normal;
    color: var(--cyan);
    font-weight: 500;
  }

  .panel-meta {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  /* ==================== FORECAST CARDS ==================== */
  .forecast-cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
  }

  .forecast-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }

  .forecast-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--cyan);
  }

  .forecast-card.tec::before { background: var(--green); }
  .forecast-card.legal::before { background: var(--cyan); }

  .forecast-info { min-width: 0; }

  .forecast-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .forecast-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .forecast-sub strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .forecast-num {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
    text-align: right;
  }

  .forecast-card.tec .forecast-num { color: var(--green); }
  .forecast-card.legal .forecast-num { color: var(--cyan); }

  .forecast-empty {
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 40px;
    font-size: 14px;
  }

  /* ==================== TREND CHART ==================== */
  .trend {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .trend-row {
    display: grid;
    grid-template-columns: 80px 1fr 100px;
    align-items: center;
    gap: 18px;
    padding: 4px 0;
  }

  .trend-row.current .trend-comp { color: var(--cyan); font-weight: 700; }
  .trend-row.future .trend-comp { color: var(--text-muted); }

  .trend-comp {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }

  .trend-bar {
    height: 22px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    display: flex;
  }

  .trend-seg {
    height: 100%;
    transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .trend-seg.green { background: var(--green); }
  .trend-seg.amber { background: var(--amber); }
  .trend-seg.red { background: var(--red); }

  .trend-seg span {
    font-size: 10px;
    font-weight: 700;
    color: var(--bg-deepest);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .trend-totals {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .trend-totals strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  /* ==================== FOOTER ==================== */
  .footer {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 48px;
    border-top: 1px solid var(--border);
    background: var(--bg-main);
    gap: 32px;
  }

  .footer-item {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 700;
  }

  .footer-item.right { justify-content: flex-end; }
  .footer-item.center { justify-content: center; }

  .footer-item strong {
    color: var(--text-primary);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0;
    text-transform: none;
  }

  .signoff {
    font-size: 13px;
    color: var(--text-secondary);
    letter-spacing: 0;
    text-transform: none;
    font-style: italic;
    font-weight: 400;
  }
</style>
</head>
<body>
<div class="dashboard">

  <header class="header">
    <div class="brand">
      <img class="brand-logo" src="https://www.larafy.com.br/assets/images/larafy.png" alt="LaraFy">
      <div class="brand-divider"></div>
      <div class="header-title">
        <h1>Painel Operacional Fiscal</h1>
        <div class="sub">Liberações fiscais · monitoramento contínuo</div>
      </div>
    </div>

    <div></div>

    <div class="header-meta">
      <div class="meta-item">
        <span class="meta-label">Competência</span>
        <span class="meta-value" id="metaComp">--</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Atualizado</span>
        <span class="meta-value sans" id="metaTs">--:--</span>
      </div>
      <span class="live">Live</span>
    </div>
  </header>

  <section class="kpis-top" id="kpisTop"></section>
  <section class="kpis-bottom" id="kpisBottom"></section>

  <main class="bottom">

    <section class="panel">
      <div class="panel-head">
        <h2 class="panel-title">Forecast <em>fechamento do mês</em></h2>
        <span class="panel-meta" id="forecastMeta">média 3 meses</span>
      </div>
      <div class="forecast-cards" id="forecastCards"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2 class="panel-title">Tendência <em>histórica</em></h2>
        <span class="panel-meta">% entregues por competência</span>
      </div>
      <div class="trend" id="trend"></div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-item">
      <span>Próxima sync em <strong id="countdown">--:--</strong></span>
    </div>
    <div class="footer-item center">
      <span class="signoff">LaraFy. Inteligência tributária para quem decide.</span>
    </div>
    <div class="footer-item right">
      <span><strong id="footerTotal">0</strong> entregas monitoradas</span>
    </div>
  </footer>

</div>

<script>
  const DATA_URL = './data/data.json';
  const REFRESH_MS = 3 * 60 * 1000;
  const MESES_ORD = { jan: 1, fev: 2, mar: 3, abr: 4, mai: 5, jun: 6, jul: 7, ago: 8, set: 9, out: 10, nov: 11, dez: 12 };

  let proximaSyncMs = REFRESH_MS;

  function ordemComp(c) {
    if (!c) return 0;
    const m = String(c).match(/([a-z]+)\/(\d+)/);
    if (!m) return 0;
    return parseInt(m[2]) * 100 + (MESES_ORD[m[1]] || 0);
  }

  function ehNoTecnico(statusOriginal) {
    const s = (statusOriginal || '').toLowerCase();
    return s.includes('pztéc') || s.includes('pztec') || s.includes('antecipada');
  }

  function ehNoLegal(statusOriginal) {
    const s = (statusOriginal || '').toLowerCase();
    return s.includes('pztéc') || s.includes('pztec') ||
           s.includes('antecipada') || s.includes('pzlegal');
  }

  function calcularForecast(entregas, competencias, compAtual) {
    const ult3 = [...competencias]
      .filter(c => c !== compAtual && ordemComp(c) < ordemComp(compAtual))
      .sort((a, b) => ordemComp(b) - ordemComp(a))
      .slice(0, 3);

    if (ult3.length === 0) return { tec: null, legal: null, comps: [] };

    let totalGeral = 0, totalTec = 0, totalLegal = 0;

    for (const comp of ult3) {
      const entr = entregas.filter(e => e.competencia === comp);
      totalGeral += entr.length;
      for (const e of entr) {
        if (ehNoTecnico(e.status_original)) totalTec++;
        if (ehNoLegal(e.status_original)) totalLegal++;
      }
    }

    return {
      tec: totalGeral > 0 ? (totalTec / totalGeral * 100) : 0,
      legal: totalGeral > 0 ? (totalLegal / totalGeral * 100) : 0,
      comps: ult3
    };
  }

  async function carregar() {
    try {
      const resp = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      render(data);
      proximaSyncMs = REFRESH_MS;
    } catch (err) {
      console.error('Erro carregando dados:', err);
    }
  }

  function render(data) {
    const comp = data.competencia_atual;
    const kpi = (data.kpis && data.kpis[comp]) || {};
    const entregas = data.entregas || [];
    const entrComp = entregas.filter(e => e.competencia === comp);

    // Header
    document.getElementById('metaComp').textContent = comp || '--';
    const dt = data.atualizado_em ? new Date(data.atualizado_em) : new Date();
    document.getElementById('metaTs').textContent =
      dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    // % Prazo Técnico atual / Prazo Legal atual
    let entrTec = 0, entrLegal = 0;
    for (const e of entrComp) {
      if (ehNoTecnico(e.status_original)) entrTec++;
      if (ehNoLegal(e.status_original)) entrLegal++;
    }
    const total = kpi.total || 0;
    const pctTec = total > 0 ? (entrTec / total * 100) : 0;
    const pctLegal = total > 0 ? (entrLegal / total * 100) : 0;

    // Atrasadas prioritárias
    const atrPrio = entrComp.filter(e =>
      e.status_semaforo === 'red' && e.prioritaria && !e.justificado
    ).length;

    renderKPIs({
      total,
      prio: kpi.prioritarias || 0,
      pctTec,
      pctLegal,
      pendentes: kpi.pendentes || 0,
      atrasadas: kpi.atrasadas || 0,
      atrPrio,
      entrTec,
      entrLegal
    });

    // Forecast
    const fc = calcularForecast(entregas, data.competencias_disponiveis || [], comp);
    renderForecast(fc);

    // Tendência histórica
    renderTrend(data, comp);

    // Footer
    document.getElementById('footerTotal').textContent = (data.total_entregas || 0).toLocaleString('pt-BR');
  }

  function renderKPIs(k) {
    document.getElementById('kpisTop').innerHTML = `
      <div class="kpi cyan">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Entregas totais</div>
        <div class="kpi-value">${k.total.toLocaleString('pt-BR')}</div>
        <div class="kpi-sub">no período da competência</div>
      </div>
      <div class="kpi cyan">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Prioritárias totais</div>
        <div class="kpi-value">${k.prio.toLocaleString('pt-BR')}</div>
        <div class="kpi-sub">do total de entregas</div>
      </div>
      <div class="kpi green">
        <div class="kpi-accent"></div>
        <div class="kpi-label">% prazo técnico</div>
        <div class="kpi-value">${k.pctTec.toFixed(1)}%</div>
        <div class="kpi-sub"><strong>${k.entrTec}</strong> de ${k.total} entregues no técnico</div>
      </div>
      <div class="kpi cyan">
        <div class="kpi-accent"></div>
        <div class="kpi-label">% prazo legal</div>
        <div class="kpi-value">${k.pctLegal.toFixed(1)}%</div>
        <div class="kpi-sub"><strong>${k.entrLegal}</strong> de ${k.total} dentro do legal</div>
      </div>
    `;

    document.getElementById('kpisBottom').innerHTML = `
      <div class="kpi amber">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Pendentes</div>
        <div class="kpi-value">${k.pendentes.toLocaleString('pt-BR')}</div>
        <div class="kpi-sub">em trabalho na operação</div>
      </div>
      <div class="kpi red">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Atrasadas</div>
        <div class="kpi-value">${k.atrasadas.toLocaleString('pt-BR')}</div>
        <div class="kpi-sub">precisam ação imediata</div>
      </div>
      <div class="kpi red">
        <div class="kpi-accent"></div>
        <div class="kpi-label">Atrasadas prioritárias</div>
        <div class="kpi-value">${k.atrPrio.toLocaleString('pt-BR')}</div>
        <div class="kpi-sub">prioritárias atrasadas, urgente</div>
      </div>
    `;
  }

  function renderForecast(fc) {
    const cont = document.getElementById('forecastCards');
    const meta = document.getElementById('forecastMeta');

    if (fc.tec === null) {
      meta.textContent = 'sem histórico suficiente';
      cont.innerHTML = '<div class="forecast-empty">Forecast requer pelo menos 1 competência fechada anterior à atual.</div>';
      return;
    }

    meta.textContent = `média de ${fc.comps.length} ${fc.comps.length === 1 ? 'mês' : 'meses'}`;

    cont.innerHTML = `
      <div class="forecast-card tec">
        <div class="forecast-info">
          <div class="forecast-label">Prazo técnico projetado</div>
          <div class="forecast-sub">se mantida a média de <strong>${fc.comps.join(', ')}</strong></div>
        </div>
        <div class="forecast-num">${fc.tec.toFixed(1)}%</div>
      </div>
      <div class="forecast-card legal">
        <div class="forecast-info">
          <div class="forecast-label">Prazo legal projetado</div>
          <div class="forecast-sub">cenário esperado de fechamento do mês</div>
        </div>
        <div class="forecast-num">${fc.legal.toFixed(1)}%</div>
      </div>
    `;
  }

  function renderTrend(data, compAtual) {
    const comps = [...(data.competencias_disponiveis || [])].sort((a, b) => ordemComp(a) - ordemComp(b));
    const kpis = data.kpis || {};

    document.getElementById('trend').innerHTML = comps.map(c => {
      const k = kpis[c] || { total: 0, entregues: 0, pendentes: 0, atrasadas: 0 };
      const ordC = ordemComp(c);
      const ordAtual = ordemComp(compAtual);
      let classe = '';
      if (c === compAtual) classe = 'current';
      else if (ordC > ordAtual) classe = 'future';

      const pctG = k.total > 0 ? (k.entregues / k.total) * 100 : 0;
      const pctA = k.total > 0 ? (k.pendentes / k.total) * 100 : 0;
      const pctR = k.total > 0 ? (k.atrasadas / k.total) * 100 : 0;

      const segGreen = pctG > 0 ? `<div class="trend-seg green" style="width: ${pctG}%">${pctG >= 8 ? `<span>${pctG.toFixed(0)}%</span>` : ''}</div>` : '';
      const segAmber = pctA > 0 ? `<div class="trend-seg amber" style="width: ${pctA}%">${pctA >= 8 ? `<span>${pctA.toFixed(0)}%</span>` : ''}</div>` : '';
      const segRed = pctR > 0 ? `<div class="trend-seg red" style="width: ${pctR}%">${pctR >= 8 ? `<span>${pctR.toFixed(0)}%</span>` : ''}</div>` : '';

      return `
        <div class="trend-row ${classe}">
          <div class="trend-comp">${c}</div>
          <div class="trend-bar">${segGreen}${segAmber}${segRed}</div>
          <div class="trend-totals"><strong>${k.total}</strong> entregas</div>
        </div>
      `;
    }).join('');
  }

  function iniciarCountdown() {
    setInterval(() => {
      proximaSyncMs -= 1000;
      if (proximaSyncMs <= 0) proximaSyncMs = 0;
      const min = Math.floor(proximaSyncMs / 60000);
      const seg = Math.floor((proximaSyncMs % 60000) / 1000);
      document.getElementById('countdown').textContent =
        `${String(min).padStart(2, '0')}:${String(seg).padStart(2, '0')}`;
    }, 1000);
  }

  carregar();
  iniciarCountdown();
  setInterval(carregar, REFRESH_MS);
</script>
</body>
</html>
