<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Operacional Fiscal & Contábil · LaraFy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deepest: #061525;
      --bg-card: #0d2438;
      --bg-card-2: #112d44;
      --bg-card-3: #163450;
      --border: rgba(255, 255, 255, 0.08);
      --fiscal: #35b9d7;
      --fiscal-dim: rgba(53, 185, 215, 0.15);
      --contabil: #ff8c42;
      --contabil-dim: rgba(255, 140, 66, 0.15);
      --green: #4ade80;
      --red: #ef4444;
      --amber: #fbbf24;
      --text: #ffffff;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-deepest);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: linear-gradient(180deg, #0a1f33 0%, #061525 100%);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: baseline; gap: 14px; }
    .brand-name { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .brand-divider { color: var(--text-dim); }
    .brand-context {
      font-size: 13px; color: var(--text-muted); font-weight: 400;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .header-info { display: flex; gap: 24px; align-items: center; }
    .header-pill { display: flex; flex-direction: column; align-items: flex-end; }
    .pill-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    .pill-value { font-size: 16px; font-weight: 600; }
    .header-link {
      font-size: 12px; color: var(--text-muted); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
      transition: all 0.15s;
    }
    .header-link:hover { background: var(--bg-card-2); color: var(--text); }

    /* ========== COMP BAR ========== */
    .comp-bar {
      display: flex; align-items: center; gap: 18px;
      padding: 14px 28px; background: rgba(13, 36, 56, 0.5);
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .comp-label {
      font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.6px; font-weight: 600;
    }
    .comp-filter { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .comp-pill {
      background: var(--bg-card); color: var(--text-muted);
      border: 1px solid var(--border); padding: 7px 16px;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: 'Poppins', sans-serif;
    }
    .comp-pill:hover { background: var(--bg-card-2); color: var(--text); }
    .comp-pill.active {
      background: var(--text); color: var(--bg-deepest);
      border-color: var(--text); font-weight: 700;
    }
    .comp-pill.is-current::after {
      content: '·'; margin-left: 6px; color: var(--fiscal);
    }
    .comp-pill.active.is-current::after { color: var(--bg-deepest); }

    /* ========== SPLIT ========== */
    .split {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px;
    }
    .team-block {
      background: var(--bg-card); border-radius: 12px;
      padding: 24px; border-top: 4px solid;
    }
    .team-block.fiscal { border-top-color: var(--fiscal); }
    .team-block.contabil { border-top-color: var(--contabil); }
    .team-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 18px;
    }
    .team-name { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    .team-block.fiscal .team-name { color: var(--fiscal); }
    .team-block.contabil .team-name { color: var(--contabil); }
    .team-subtotal { font-size: 12px; color: var(--text-muted); }

    /* ========== CARDS DE CONTAGEM (clicáveis) ========== */
    .cards-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .card-count {
      background: var(--bg-card-2); padding: 14px 12px;
      border-radius: 8px; border: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s, transform 0.1s, border-color 0.15s;
      position: relative;
    }
    .card-count:hover {
      background: var(--bg-card-3); border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .card-count::after {
      content: '↗'; position: absolute; top: 8px; right: 10px;
      font-size: 12px; color: var(--text-dim); opacity: 0; transition: opacity 0.15s;
    }
    .card-count:hover::after { opacity: 1; }
    .card-label {
      font-size: 10px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 6px;
    }
    .card-value { font-size: 30px; font-weight: 700; line-height: 1; }
    .card-value.amber { color: var(--amber); }
    .card-value.red { color: var(--red); }

    /* ========== HERO % + FORECAST ========== */
    .hero-row {
      display: grid; grid-template-columns: 1.5fr 1fr;
      gap: 12px; margin-bottom: 16px;
    }
    .card-percent {
      background: var(--bg-card-3); border-radius: 10px;
      padding: 18px; text-align: center; border: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      position: relative;
    }
    .card-percent:hover {
      background: #1a3a58; transform: translateY(-1px);
    }
    .card-percent::after {
      content: '↗'; position: absolute; top: 8px; right: 12px;
      font-size: 12px; color: var(--text-dim); opacity: 0; transition: opacity 0.15s;
    }
    .card-percent:hover::after { opacity: 1; }
    .card-percent .card-label { margin-bottom: 4px; }
    .percent-value {
      font-size: 56px; font-weight: 800; line-height: 1;
      color: var(--green); letter-spacing: -1.5px;
    }
    .percent-suffix { font-size: 26px; font-weight: 600; }
    .card-forecast {
      background: var(--bg-card-2); border-radius: 10px;
      padding: 18px; border: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center;
    }
    .forecast-value {
      font-size: 26px; font-weight: 700; line-height: 1; margin-top: 4px;
    }
    .forecast-source {
      font-size: 11px; color: var(--text-dim);
      margin-top: 8px; line-height: 1.3;
    }
    .forecast-empty { font-size: 13px; color: var(--text-dim); font-style: italic; }

    /* ========== RANKING ========== */
    .ranking {
      background: var(--bg-card-2); border-radius: 10px;
      padding: 14px; border: 1px solid var(--border);
    }
    .ranking-title {
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.6px; margin-bottom: 8px;
    }
    .ranking-row {
      display: grid; grid-template-columns: 1fr auto auto;
      gap: 14px; padding: 7px 8px; align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 4px; cursor: pointer; transition: background 0.15s;
    }
    .ranking-row:last-child { border-bottom: none; }
    .ranking-row:hover { background: rgba(255,255,255,0.04); }
    .rank-name { font-size: 13px; }
    .rank-numbers { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
    .rank-pct { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }
    .rank-pct.good { color: var(--green); }
    .rank-pct.mid { color: var(--amber); }
    .rank-pct.bad { color: var(--red); }

    /* ========== BOTTOM ROW ========== */
    .bottom-row {
      display: grid; grid-template-columns: 1.6fr 1fr;
      gap: 20px; padding: 0 20px 20px;
    }
    .panel { background: var(--bg-card); border-radius: 12px; padding: 24px; }
    .panel-title {
      font-size: 13px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .legend { display: flex; gap: 14px; font-size: 11px; }
    .legend-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
    .legend-swatch { width: 11px; height: 11px; border-radius: 50%; }

    /* ========== ATRASOS ========== */
    .atrasos { max-height: 320px; overflow-y: auto; }
    .atraso-row {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 10px; padding: 9px 6px; align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer; border-radius: 4px; transition: background 0.15s;
    }
    .atraso-row:hover { background: rgba(255,255,255,0.04); }
    .atraso-row:last-child { border-bottom: none; }
    .time-tag {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px;
      min-width: 68px; text-align: center;
    }
    .time-tag.fiscal {
      background: var(--fiscal-dim); color: var(--fiscal);
      border: 1px solid rgba(53, 185, 215, 0.3);
    }
    .time-tag.contabil {
      background: var(--contabil-dim); color: var(--contabil);
      border: 1px solid rgba(255, 140, 66, 0.3);
    }
    .atraso-empresa {
      font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .atraso-dias { font-size: 13px; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }

    /* ========== FOOTER ========== */
    .footer {
      text-align: center; padding: 16px; font-size: 11px;
      color: var(--text-dim); border-top: 1px solid var(--border);
    }

    /* ========== SVG CHART ========== */
    .chart-svg { width: 100%; height: auto; max-height: 280px; }
    .chart-grid-line { stroke: rgba(255, 255, 255, 0.06); stroke-width: 1; }
    .chart-label {
      fill: var(--text-dim); font-size: 11px; font-family: 'Poppins', sans-serif;
    }
    .chart-line { fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .chart-line.fiscal { stroke: var(--fiscal); }
    .chart-line.contabil { stroke: var(--contabil); }
    .chart-dot.fiscal { fill: var(--fiscal); }
    .chart-dot.contabil { fill: var(--contabil); }

    /* ========== MODAL DRILL-DOWN ========== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(6, 21, 37, 0.88);
      backdrop-filter: blur(4px); display: none;
      align-items: center; justify-content: center;
      z-index: 1000; padding: 24px;
    }
    .modal-overlay.aberto { display: flex; }
    .modal {
      background: var(--bg-card); border-radius: 12px;
      width: 100%; max-width: 1500px; max-height: 92vh;
      display: flex; flex-direction: column;
      border: 1px solid var(--border); overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      background: var(--bg-card-2);
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-title .count {
      color: var(--text-muted); font-weight: 400; margin-left: 8px;
    }
    .modal-actions { display: flex; gap: 10px; align-items: center; }
    .modal-btn {
      background: var(--bg-card-3); color: var(--text);
      border: 1px solid var(--border); padding: 8px 14px;
      border-radius: 6px; font-size: 12px; cursor: pointer;
      font-family: 'Poppins', sans-serif; font-weight: 500;
      transition: background 0.15s;
    }
    .modal-btn:hover { background: #1a3a58; }
    .modal-close {
      background: transparent; color: var(--text-muted); border: none;
      font-size: 22px; cursor: pointer; padding: 4px 10px;
      line-height: 1; transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-controls {
      display: flex; gap: 12px; padding: 14px 24px;
      border-bottom: 1px solid var(--border); align-items: center;
    }
    .modal-search {
      flex: 1; background: var(--bg-card-2); color: var(--text);
      border: 1px solid var(--border); padding: 9px 14px;
      border-radius: 6px; font-size: 13px; font-family: 'Poppins', sans-serif;
    }
    .modal-search:focus { outline: none; border-color: var(--fiscal); }
    .modal-body { flex: 1; overflow: auto; padding: 0; }
    .modal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .modal-table thead th {
      background: var(--bg-card-2); padding: 11px 14px;
      text-align: left; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .modal-table thead th:hover { color: var(--text); }
    .modal-table thead th.sorted::after {
      content: ' ↓'; color: var(--fiscal);
    }
    .modal-table thead th.sorted.asc::after { content: ' ↑'; }
    .modal-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s;
    }
    .modal-table tbody tr:hover { background: rgba(255,255,255,0.025); }
    .modal-table td { padding: 9px 14px; vertical-align: middle; }
    .modal-table td.cnpj, .modal-table td.data, .modal-table td.dias {
      font-variant-numeric: tabular-nums;
    }
    .modal-table td.empresa { font-weight: 500; }
    .modal-table td.responsavel { color: var(--text-muted); }
    .modal-table .badge {
      display: inline-block; padding: 3px 9px; border-radius: 4px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.3px; white-space: nowrap;
    }
    .badge.green { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .badge.red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .badge.amber { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
    .badge.gray { background: rgba(148,163,184,0.15); color: var(--text-muted); border: 1px solid rgba(148,163,184,0.3); }
    .badge.fiscal { background: var(--fiscal-dim); color: var(--fiscal); border: 1px solid rgba(53,185,215,0.3); }
    .badge.contabil { background: var(--contabil-dim); color: var(--contabil); border: 1px solid rgba(255,140,66,0.3); }
    .modal-empty {
      padding: 60px 24px; text-align: center;
      color: var(--text-dim); font-size: 14px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="brand">
      <span class="brand-name">LaraFy</span>
      <span class="brand-divider">·</span>
      <span class="brand-context">Painel Operacional Fiscal & Contábil</span>
    </div>
    <div class="header-info">
      <a class="header-link" href="tv.html" title="Modo TV">Modo TV</a>
      <div class="header-pill">
        <span class="pill-label">Atualizado</span>
        <span class="pill-value" id="atualizado">--</span>
      </div>
    </div>
  </header>

  <div class="comp-bar">
    <span class="comp-label">Competência</span>
    <div class="comp-filter" id="comp-filter"></div>
  </div>

  <main>
    <section class="split">
      <div class="team-block fiscal">
        <div class="team-header">
          <span class="team-name">FISCAL</span>
          <span class="team-subtotal" id="subtotal-fiscal">--</span>
        </div>
        <div class="cards-row" id="cards-fiscal"></div>
        <div class="hero-row" id="hero-fiscal"></div>
        <div class="ranking" id="ranking-fiscal"></div>
      </div>
      <div class="team-block contabil">
        <div class="team-header">
          <span class="team-name">CONTÁBIL</span>
          <span class="team-subtotal" id="subtotal-contabil">--</span>
        </div>
        <div class="cards-row" id="cards-contabil"></div>
        <div class="hero-row" id="hero-contabil"></div>
        <div class="ranking" id="ranking-contabil"></div>
      </div>
    </section>

    <section class="bottom-row">
      <div class="panel">
        <div class="panel-title">
          <span>Tendência Histórica de % Entregue</span>
          <div class="legend">
            <span class="legend-item"><span class="legend-swatch" style="background:var(--fiscal)"></span>Fiscal</span>
            <span class="legend-item"><span class="legend-swatch" style="background:var(--contabil)"></span>Contábil</span>
          </div>
        </div>
        <div id="chart-container"></div>
      </div>
      <div class="panel">
        <div class="panel-title">Atrasos Críticos</div>
        <div class="atrasos" id="atrasos"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    LaraFy. Inteligência tributária para quem decide.
  </footer>

  <!-- Modal drill-down -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this) fecharModal()">
    <div class="modal">
      <div class="modal-header">
        <div>
          <span class="modal-title" id="modal-title">--</span>
          <span class="count" id="modal-count"></span>
        </div>
        <div class="modal-actions">
          <button class="modal-btn" id="btn-export">Exportar CSV</button>
          <button class="modal-close" onclick="fecharModal()">×</button>
        </div>
      </div>
      <div class="modal-controls">
        <input type="text" class="modal-search" id="modal-search" placeholder="Buscar por empresa, CNPJ ou responsável...">
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script>
    const DATA_URL = 'data/data.json';
    const REFRESH_MS = 5 * 60 * 1000;

    const MESES_ORD = { jan:1, fev:2, mar:3, abr:4, mai:5, jun:6, jul:7, ago:8, set:9, out:10, nov:11, dez:12 };

    const estado = {
      data: null,
      competenciaSelecionada: null,
      modal: {
        aberto: false,
        titulo: '',
        entregas: [],
        entregasFiltradas: [],
        busca: '',
        sortBy: 'dias_atraso',
        sortDir: 'desc'
      }
    };

    function ordemComp(comp) {
      if (!comp) return 0;
      const m = String(comp).match(/([a-z]+)\/(\d+)/);
      if (!m) return 0;
      return parseInt(m[2]) * 100 + (MESES_ORD[m[1]] || 0);
    }

    function classePercentual(pct) {
      if (pct >= 75) return 'good';
      if (pct >= 50) return 'mid';
      return 'bad';
    }

    function formatarHora(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      } catch (e) { return iso; }
    }

    function parseDataBR(d) {
      if (!d) return null;
      const s = String(d).trim();
      if (!s) return null;
      let m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
      if (m) return new Date(+m[3], +m[2]-1, +m[1]);
      m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return new Date(+m[1], +m[2]-1, +m[3]);
      return null;
    }

    // Regra "entregue se dentro de PzTec OU PzLegal"
    function statusPrazo(e) {
      if (!e.data_entrega) return { texto: 'Não entregue', classe: 'gray' };
      const dEnt = parseDataBR(e.data_entrega);
      if (!dEnt) return { texto: 'Data inválida', classe: 'gray' };
      const dLeg = parseDataBR(e.prazo_legal);
      const dTec = parseDataBR(e.prazo_tecnico);
      const dentroLeg = dLeg && dEnt <= dLeg;
      const dentroTec = dTec && dEnt <= dTec;
      if (dentroLeg || dentroTec) return { texto: 'Dentro do prazo', classe: 'green' };
      return { texto: 'Fora do prazo', classe: 'red' };
    }

    async function carregar() {
      try {
        const resp = await fetch(DATA_URL + '?ts=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        estado.data = data;

        const disponiveis = data.competencias_disponiveis || [];
        if (estado.competenciaSelecionada === null || !disponiveis.includes(estado.competenciaSelecionada)) {
          estado.competenciaSelecionada = data.competencia_atual;
        }
        renderTudo();
      } catch (err) {
        console.error('Erro carregando data.json:', err);
        document.getElementById('atualizado').textContent = 'erro';
      }
    }

    function renderTudo() {
      if (!estado.data) return;
      const data = estado.data;
      renderCompFilter(data.competencias_disponiveis || [], data.competencia_atual);
      document.getElementById('atualizado').textContent = formatarHora(data.atualizado_em);
      renderTime('fiscal', data.fiscal, estado.competenciaSelecionada);
      renderTime('contabil', data.contabil, estado.competenciaSelecionada);
      renderTendencia(data.fiscal, data.contabil);
      renderAtrasos(data.atrasos_criticos || []);
    }

    function renderCompFilter(competencias, competenciaAtualDoSistema) {
      const comps = competencias.slice().sort((a, b) => ordemComp(a) - ordemComp(b));
      const container = document.getElementById('comp-filter');
      container.innerHTML = comps.map(c => `
        <button class="comp-pill ${c === estado.competenciaSelecionada ? 'active' : ''} ${c === competenciaAtualDoSistema ? 'is-current' : ''}"
          data-comp="${c}" title="${c === competenciaAtualDoSistema ? 'Competência corrente' : c}">${c}</button>
      `).join('');
      container.querySelectorAll('.comp-pill').forEach(btn => {
        btn.addEventListener('click', () => {
          estado.competenciaSelecionada = btn.dataset.comp;
          renderTudo();
        });
      });
    }

    function renderTime(slug, dadosTime, competencia) {
      const cardsEl = document.getElementById('cards-' + slug);
      const heroEl = document.getElementById('hero-' + slug);
      const rankingEl = document.getElementById('ranking-' + slug);
      const subtotalEl = document.getElementById('subtotal-' + slug);
      const timeNome = slug === 'fiscal' ? 'Fiscal' : 'Contabil';

      if (!dadosTime) {
        cardsEl.innerHTML = '<div style="grid-column:1/-1; padding:16px; color:var(--text-dim)">Sem dados do time.</div>';
        return;
      }

      const kpis = (dadosTime.kpis || {})[competencia];
      if (!kpis) {
        cardsEl.innerHTML = `<div style="grid-column:1/-1; padding:16px; color:var(--text-dim)">Sem dados para ${competencia}.</div>`;
        heroEl.innerHTML = '';
        rankingEl.innerHTML = '';
        if (subtotalEl) subtotalEl.textContent = '--';
        return;
      }

      if (subtotalEl) subtotalEl.textContent = `${kpis.total} entregas · ${kpis.prioritarias} prioritárias`;

      cardsEl.innerHTML = `
        <div class="card-count" data-time="${timeNome}" data-status="all" data-comp="${competencia}">
          <div class="card-label">Total</div>
          <div class="card-value">${kpis.total}</div>
        </div>
        <div class="card-count" data-time="${timeNome}" data-status="green" data-comp="${competencia}">
          <div class="card-label">Entregues</div>
          <div class="card-value">${kpis.entregues}</div>
        </div>
        <div class="card-count" data-time="${timeNome}" data-status="amber" data-comp="${competencia}">
          <div class="card-label">Pendentes</div>
          <div class="card-value amber">${kpis.pendentes}</div>
        </div>
        <div class="card-count" data-time="${timeNome}" data-status="red" data-comp="${competencia}">
          <div class="card-label">Atrasadas</div>
          <div class="card-value red">${kpis.atrasadas}</div>
        </div>
      `;
      cardsEl.querySelectorAll('.card-count').forEach(el => {
        el.addEventListener('click', () => abrirModalCard(el.dataset.time, el.dataset.status, el.dataset.comp));
      });

      const fc = dadosTime.forecast || {};
      const forecastHTML = fc.baseline !== null && fc.baseline !== undefined
        ? `
          <div class="card-label">Forecast (baseline)</div>
          <div class="forecast-value">${fc.baseline.toFixed(1)}<span class="percent-suffix">%</span></div>
          <div class="forecast-source">média de ${fc.amostra_meses} ${fc.amostra_meses === 1 ? 'mês' : 'meses'}: ${(fc.competencias_baseline || []).join(', ')}</div>
        `
        : `<div class="card-label">Forecast (baseline)</div><div class="forecast-empty">Sem histórico fechado</div>`;

      heroEl.innerHTML = `
        <div class="card-percent" data-time="${timeNome}" data-status="green" data-comp="${competencia}">
          <div class="card-label">% Entregue</div>
          <div class="percent-value">${kpis.percentual_entregues.toFixed(1)}<span class="percent-suffix">%</span></div>
        </div>
        <div class="card-forecast">${forecastHTML}</div>
      `;
      heroEl.querySelectorAll('.card-percent').forEach(el => {
        el.addEventListener('click', () => abrirModalCard(el.dataset.time, el.dataset.status, el.dataset.comp));
      });

      const ranking = (dadosTime.ranking || {})[competencia] || [];
      const top5 = ranking.slice(0, 5);
      if (top5.length === 0) {
        rankingEl.innerHTML = `
          <div class="ranking-title">Top responsáveis · ${competencia}</div>
          <div style="color:var(--text-dim); padding:10px 0; font-size:12px">Sem responsáveis na competência.</div>
        `;
        return;
      }
      rankingEl.innerHTML = `
        <div class="ranking-title">Top responsáveis · ${competencia} (clique pra detalhar)</div>
        ${top5.map(r => `
          <div class="ranking-row" data-resp="${encodeURIComponent(r.nome)}" data-time="${timeNome}" data-comp="${competencia}">
            <div class="rank-name">${r.nome}</div>
            <div class="rank-numbers">${r.entregues}/${r.total}</div>
            <div class="rank-pct ${classePercentual(r.percentual)}">${r.percentual.toFixed(1)}%</div>
          </div>
        `).join('')}
      `;
      rankingEl.querySelectorAll('.ranking-row').forEach(el => {
        el.addEventListener('click', () => abrirModalResponsavel(
          decodeURIComponent(el.dataset.resp), el.dataset.time, el.dataset.comp
        ));
      });
    }

    function renderTendencia(fiscal, contabil) {
      const tFiscal = (fiscal && fiscal.tendencia) ? fiscal.tendencia : [];
      const tContabil = (contabil && contabil.tendencia) ? contabil.tendencia : [];
      const compSet = new Set();
      tFiscal.forEach(p => compSet.add(p.competencia));
      tContabil.forEach(p => compSet.add(p.competencia));
      const comps = Array.from(compSet).sort((a, b) => ordemComp(a) - ordemComp(b));
      if (comps.length === 0) {
        document.getElementById('chart-container').innerHTML = '<div style="color:var(--text-dim); padding:24px 0; text-align:center">Sem dados de tendência.</div>';
        return;
      }
      const W = 1000, H = 280;
      const pad = { top:20, right:20, bottom:36, left:40 };
      const innerW = W - pad.left - pad.right;
      const innerH = H - pad.top - pad.bottom;
      const xStep = comps.length > 1 ? innerW / (comps.length - 1) : 0;
      const xAt = i => pad.left + i * xStep;
      const yAt = pct => pad.top + innerH - (pct / 100) * innerH;
      const mapa = tend => { const m = {}; tend.forEach(p => m[p.competencia] = p); return m; };
      const mFiscal = mapa(tFiscal), mContabil = mapa(tContabil);
      const buildPath = mapaTime => {
        const pontos = comps.map((c, i) => mapaTime[c] ? { x: xAt(i), y: yAt(mapaTime[c].percentual_entregues) } : null).filter(Boolean);
        if (pontos.length === 0) return '';
        return pontos.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
      };
      const buildDots = (mapaTime, slug) => comps.map((c, i) => mapaTime[c] ? `<circle class="chart-dot ${slug}" cx="${xAt(i).toFixed(1)}" cy="${yAt(mapaTime[c].percentual_entregues).toFixed(1)}" r="4" />` : '').join('');
      const gridLines = [0,25,50,75,100].map(pct => `<line class="chart-grid-line" x1="${pad.left}" y1="${yAt(pct).toFixed(1)}" x2="${W-pad.right}" y2="${yAt(pct).toFixed(1)}" /><text class="chart-label" x="${pad.left-8}" y="${yAt(pct).toFixed(1)}" dy="3" text-anchor="end">${pct}%</text>`).join('');
      const xLabels = comps.map((c, i) => `<text class="chart-label" x="${xAt(i).toFixed(1)}" y="${H-16}" text-anchor="middle">${c}</text>`).join('');
      document.getElementById('chart-container').innerHTML = `
        <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
          ${gridLines}
          <path class="chart-line fiscal" d="${buildPath(mFiscal)}" />
          <path class="chart-line contabil" d="${buildPath(mContabil)}" />
          ${buildDots(mFiscal, 'fiscal')}
          ${buildDots(mContabil, 'contabil')}
          ${xLabels}
        </svg>
      `;
    }

    function renderAtrasos(lista) {
      const el = document.getElementById('atrasos');
      if (!lista || lista.length === 0) {
        el.innerHTML = '<div style="color:var(--text-dim); padding:16px 0; text-align:center">Nenhum atraso crítico.</div>';
        return;
      }
      el.innerHTML = lista.slice(0, 12).map(a => `
        <div class="atraso-row" data-time="${a.time}">
          <span class="time-tag ${(a.time || '').toLowerCase()}">${a.time || '--'}</span>
          <span class="atraso-empresa" title="${a.empresa}">${a.empresa}</span>
          <span class="atraso-dias">${a.dias_atraso}d</span>
        </div>
      `).join('');
      el.querySelectorAll('.atraso-row').forEach(row => {
        row.addEventListener('click', () => abrirModalCard(row.dataset.time, 'red', null));
      });
    }

    // ========== MODAL DRILL-DOWN ==========

    function abrirModalCard(time, status, comp) {
      const todas = (estado.data && estado.data.entregas) || [];
      let filtradas = todas.filter(e => e.time === time);
      if (comp) filtradas = filtradas.filter(e => e.competencia === comp);
      if (status === 'green') filtradas = filtradas.filter(e => e.status_semaforo === 'green');
      else if (status === 'amber') filtradas = filtradas.filter(e => e.status_semaforo === 'amber');
      else if (status === 'red') filtradas = filtradas.filter(e => e.status_semaforo === 'red');

      const statusLabel = {
        all: 'Todas',
        green: 'Entregues',
        amber: 'Pendentes',
        red: 'Atrasadas'
      }[status] || status;

      const titulo = comp
        ? `${statusLabel} · ${time} · ${comp}`
        : `${statusLabel} · ${time} · todas as competências`;

      abrirModalGenerico(titulo, filtradas);
    }

    function abrirModalResponsavel(responsavel, time, comp) {
      const todas = (estado.data && estado.data.entregas) || [];
      const filtradas = todas.filter(e =>
        e.responsavel === responsavel && e.time === time && e.competencia === comp
      );
      abrirModalGenerico(`${responsavel} · ${time} · ${comp}`, filtradas);
    }

    function abrirModalGenerico(titulo, entregas) {
      estado.modal.aberto = true;
      estado.modal.titulo = titulo;
      estado.modal.entregas = entregas;
      estado.modal.busca = '';
      estado.modal.sortBy = 'dias_atraso';
      estado.modal.sortDir = 'desc';

      document.getElementById('modal').classList.add('aberto');
      document.getElementById('modal-title').textContent = titulo;
      document.getElementById('modal-search').value = '';
      renderModal();
    }

    function fecharModal() {
      estado.modal.aberto = false;
      document.getElementById('modal').classList.remove('aberto');
    }

    function renderModal() {
      let entregas = estado.modal.entregas.slice();

      // Filtro de busca
      const termo = (estado.modal.busca || '').toLowerCase().trim();
      if (termo) {
        entregas = entregas.filter(e =>
          (e.empresa || '').toLowerCase().includes(termo) ||
          (e.cnpj || '').toLowerCase().includes(termo) ||
          (e.responsavel || '').toLowerCase().includes(termo) ||
          (e.obrigacao || '').toLowerCase().includes(termo)
        );
      }

      // Sort
      const sortBy = estado.modal.sortBy;
      const dir = estado.modal.sortDir === 'asc' ? 1 : -1;
      entregas.sort((a, b) => {
        let va = a[sortBy], vb = b[sortBy];
        if (sortBy === 'data_entrega' || sortBy === 'prazo_legal' || sortBy === 'prazo_tecnico') {
          va = parseDataBR(va) || 0;
          vb = parseDataBR(vb) || 0;
        }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        if (va < vb) return -1 * dir;
        if (va > vb) return 1 * dir;
        return 0;
      });

      estado.modal.entregasFiltradas = entregas;
      document.getElementById('modal-count').textContent = `(${entregas.length} ${entregas.length === 1 ? 'entrega' : 'entregas'})`;

      const body = document.getElementById('modal-body');
      if (entregas.length === 0) {
        body.innerHTML = '<div class="modal-empty">Nenhuma entrega encontrada com os filtros aplicados.</div>';
        return;
      }

      const cols = [
        { key: 'time', label: 'Time' },
        { key: 'empresa', label: 'Empresa' },
        { key: 'cnpj', label: 'CNPJ' },
        { key: 'obrigacao', label: 'Obrigação' },
        { key: 'competencia', label: 'Comp' },
        { key: 'responsavel', label: 'Responsável' },
        { key: 'prazo_legal', label: 'Pz Legal' },
        { key: 'prazo_tecnico', label: 'Pz Técnico' },
        { key: 'data_entrega', label: 'Data Entrega' },
        { key: 'prazo_atendido', label: 'Prazo' },
        { key: 'status_original', label: 'Status' },
        { key: 'dias_atraso', label: 'Dias Atraso' }
      ];

      const ths = cols.map(c => {
        const sorted = sortBy === c.key ? 'sorted' : '';
        const asc = estado.modal.sortDir === 'asc' ? 'asc' : '';
        return `<th data-col="${c.key}" class="${sorted} ${asc}">${c.label}</th>`;
      }).join('');

      const rows = entregas.map(e => {
        const sp = statusPrazo(e);
        const semaforoClass = e.status_semaforo === 'green' ? 'green'
                            : e.status_semaforo === 'red' ? 'red'
                            : e.status_semaforo === 'amber' ? 'amber' : 'gray';
        return `
          <tr>
            <td><span class="badge ${(e.time || '').toLowerCase()}">${e.time || '--'}</span></td>
            <td class="empresa">${e.empresa || '--'}${e.prioritaria ? ' <span class="badge amber" style="margin-left:6px">prio</span>' : ''}</td>
            <td class="cnpj">${e.cnpj || '--'}</td>
            <td>${e.obrigacao || '--'}</td>
            <td>${e.competencia || '--'}</td>
            <td class="responsavel">${e.responsavel || 'Sem responsável'}</td>
            <td class="data">${e.prazo_legal || '--'}</td>
            <td class="data">${e.prazo_tecnico || '--'}</td>
            <td class="data">${e.data_entrega || '--'}</td>
            <td><span class="badge ${sp.classe}">${sp.texto}</span></td>
            <td><span class="badge ${semaforoClass}">${e.status_original || '--'}</span></td>
            <td class="dias">${e.dias_atraso > 0 ? e.dias_atraso + 'd' : '--'}</td>
          </tr>
        `;
      }).join('');

      body.innerHTML = `
        <table class="modal-table">
          <thead><tr>${ths}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      body.querySelectorAll('th[data-col]').forEach(th => {
        th.addEventListener('click', () => {
          const col = th.dataset.col;
          if (estado.modal.sortBy === col) {
            estado.modal.sortDir = estado.modal.sortDir === 'asc' ? 'desc' : 'asc';
          } else {
            estado.modal.sortBy = col;
            estado.modal.sortDir = 'desc';
          }
          renderModal();
        });
      });
    }

    function exportarCSV() {
      const entregas = estado.modal.entregasFiltradas || [];
      if (entregas.length === 0) return;
      const header = ['Time','Empresa','CNPJ','Obrigacao','Competencia','Responsavel','Prazo Legal','Prazo Tecnico','Data Entrega','Dentro do Prazo','Status','Dias Atraso','Protocolo','Prioritaria','Justificado'];
      const linhas = entregas.map(e => {
        const sp = statusPrazo(e);
        return [
          e.time || '', e.empresa || '', e.cnpj || '', e.obrigacao || '',
          e.competencia || '', e.responsavel || '', e.prazo_legal || '',
          e.prazo_tecnico || '', e.data_entrega || '', sp.texto,
          e.status_original || '', e.dias_atraso || 0, e.protocolo || '',
          e.prioritaria ? 'Sim' : 'Nao', e.justificado ? 'Sim' : 'Nao'
        ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(';');
      });
      const csv = '\uFEFF' + [header.join(';'), ...linhas].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `painel-larafy-${(estado.modal.titulo || 'export').replace(/[^a-z0-9-]/gi, '_').toLowerCase()}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Bindings
    document.getElementById('modal-search').addEventListener('input', (e) => {
      estado.modal.busca = e.target.value;
      renderModal();
    });
    document.getElementById('btn-export').addEventListener('click', exportarCSV);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && estado.modal.aberto) fecharModal();
    });

    // Boot
    carregar();
    setInterval(carregar, REFRESH_MS);
  </script>
</body>
</html>
